version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# InfluenceHub — Docker Compose
# Starts: API server + PostgreSQL + Redis
# Usage: docker-compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: influencehub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2123
      POSTGRES_DB: influencehub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d influencehub"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - influencehub_net

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: influencehub_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - influencehub_net

  # ── API Server ───────────────────────────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    container_name: influencehub_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      API_VERSION: v1
      DATABASE_URL: postgresql://postgres:2123@postgres:5432/influencehub?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # IMPORTANT: override these with real secrets in production
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 30d
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_NAME: InfluenceHub
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@influencehub.com}
      BCRYPT_ROUNDS: 12
      MAX_LOGIN_ATTEMPTS: 5
      LOCK_TIME_MINUTES: 30
      OTP_EXPIRES_MINUTES: 10
      LOG_LEVEL: info
      LOG_DIR: /app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - api_logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - influencehub_net

volumes:
  postgres_data:
  redis_data:
  api_logs:

networks:
  influencehub_net:
    driver: bridge
